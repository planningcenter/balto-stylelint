name: Test
on: [pull_request]

jobs:

  balto-stylelint-v16:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
      - run: "npm ci"
        working-directory: "test/v16"
      - uses: ./
        with:
          working-directory: "test/v16"
